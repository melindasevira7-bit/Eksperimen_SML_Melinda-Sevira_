name: Automated Preprocessing SmSA

on:
  push:
    branches:
      - main
    paths:
      - 'smsa_raw/**'
      - 'preprocessing/automate_Melinda-Sevira.py'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Alasan menjalankan workflow secara manual'
        required: false
        default: 'Manual trigger'

jobs:
  preprocessing:
    name: Run Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Preprocessing Script
        run: |
          cd preprocessing
          python automate_Melinda-Sevira.py \
            --output_dir smsa_preprocessing \
            --raw_dir ../smsa_raw

      - name: Verify Output
        run: |
          echo "=== Verifikasi Output Preprocessing ==="
          ls -lh preprocessing/smsa_preprocessing/
          python -c "
          import pandas as pd
          df = pd.read_csv('preprocessing/smsa_preprocessing/smsa_preprocessed.csv')
          print(f'Shape: {df.shape}')
          print(f'Kolom: {list(df.columns)}')
          print(f'Distribusi label:')
          print(df['sentiment'].value_counts())
          "

      - name: Upload Preprocessed Dataset as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smsa-preprocessed-${{ github.run_number }}
          path: preprocessing/smsa_preprocessing/
          retention-days: 30

      - name: Commit Preprocessed Data to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/smsa_preprocessing/
          git diff --staged --quiet || git commit -m "chore: update preprocessed dataset [run #${{ github.run_number }}]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
